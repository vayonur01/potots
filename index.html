<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Dashboard | Canlı Ekran Takibi</title>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --card-bg: #16161a;
            --text-primary: #f1f1f1;
            --text-secondary: #94a3b8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --border-color: #24242b;
            --shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color);
            color: var(--text-primary); display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 40px 20px;
        }
        header {
            width: 100%; max-width: 1200px; padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color); margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { font-size: 22px; font-weight: 300; letter-spacing: 1px; }
        header h1 span { font-weight: 800; color: #fff; }
        .active-badge {
            background-color: rgba(16, 185, 129, 0.1); color: var(--accent-green);
            padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .dashboard-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; }
        .device-card {
            background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px;
            padding: 25px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 15px;
            transition: all 0.3s ease;
        }
        .device-card:hover { transform: translateY(-6px); border-color: #3b3b4f; }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; }
        .device-name { font-size: 18px; font-weight: 700; color: #fff; }
        
        .pulse-dot { width: 10px; height: 10px; border-radius: 50%; background-color: var(--accent-green); position: relative; }
        .pulse-dot::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background-color: var(--accent-green); animation: pulse 2s infinite; top: 0; left: 0;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2.5); opacity: 0; } }

        .card-body { display: flex; flex-direction: column; gap: 8px; }
        .info-row { display: flex; justify-content: space-between; font-size: 14px; }
        .info-label { color: var(--text-secondary); }
        .info-value { color: #fff; font-family: monospace; font-weight: 600; }
        
        .live-btn {
            background-color: var(--accent-red); color: white; border: none; padding: 12px;
            border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; margin-top: 10px;
            transition: background 0.2s; text-align: center; letter-spacing: 0.5px;
        }
        .live-btn:hover { background-color: #dc2626; }
        
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px; color: var(--text-secondary); border: 2px dashed var(--border-color); border-radius: 14px; }
        
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95); align-items: center; justify-content: center; flex-direction: column; gap: 15px;
        }
        .modal.show { display: flex; }
        .modal-content {
            max-width: 90%; max-height: 75%; border-radius: 10px; border: 4px solid #24242b;
            background-color: #000;
        }
        .close-modal { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; user-select: none; }
        .live-indicator { color: var(--accent-red); font-weight: 800; font-size: 16px; animation: blink 1s infinite; letter-spacing: 1px; }
        
        /* Yeni Eklenecek Yenileme Butonu Stili */
        .refresh-btn {
            background-color: var(--accent-blue); color: white; border: none; padding: 10px 20px;
            border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
            transition: background 0.2s, transform 0.1s; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .refresh-btn:hover { background-color: #2563eb; }
        .refresh-btn:active { transform: scale(0.97); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <header>
        <h1>SİSTEM <span>PANELİ</span></h1>
        <div id="total-count" class="active-badge">Aktif Cihaz: 0</div>
    </header>

    <div id="dashboard" class="dashboard-container">
        <div class="empty-state">Şu an aktif bağlantı yok. Cihaz bekleniyor...</div>
    </div>

    <div id="liveModal" class="modal">
        <span class="close-modal" onclick="closeLive()">&times;</span>
        <div class="live-indicator">🔴 CANLI YAYIN TAKİBİ</div>
        <button id="manualRefreshBtn" class="refresh-btn">🔄 GÖRÜNTÜYÜ YENİLE</button>
        <img class="modal-content" id="liveStreamImg" src="">
    </div>

    <script>
        let eskiVeriString = "";
        let canliYayinZamanlayici = null; 
        let mevcutAktifIP = ""; // Yenileme butonunun hangi cihazı tetikleyeceğini bilmesi için hafıza

        function verileriCek() {
            fetch('/api/durum?t=' + new Date().getTime())
                .then(response => response.json())
                .then(devices => {
                    const yeniVeriString = JSON.stringify(devices);
                    const dashboard = document.getElementById('dashboard');
                    const totalCount = document.getElementById('total-count');
                    const ipListesi = Object.keys(devices);
                    
                    totalCount.innerText = `Aktif Cihaz: ${ipListesi.length}`;

                    if (yeniVeriString === eskiVeriString) return; 
                    eskiVeriString = yeniVeriString;

                    if (ipListesi.length === 0) {
                        dashboard.innerHTML = '<div class="empty-state">Şu an aktif bağlantı yok. Cihaz bekleniyor...</div>';
                        closeLive();
                        return;
                    }

                    let htmlIcerik = '';
                    for (const ip of ipListesi) {
                        const cihaz = devices[ip];
                        htmlIcerik += `
                            <div class="device-card">
                                <div class="card-header">
                                    <div class="device-name">${cihaz.bilgisayar_adi}</div>
                                    <div class="pulse-dot"></div>
                                </div>
                                <div class="card-body">
                                    <div class="info-row"><span class="info-label">IP Adresi:</span><span class="info-value">${ip}</span></div>
                                    <div class="info-row"><span class="info-label">Durum:</span><span class="info-value" style="color: var(--accent-green)">ÇEVRİMİÇİ</span></div>
                                    <button class="live-btn" onclick="openLive('${ip}')">📺 CANLI İZLE</button>
                                </div>
                            </div>
                        `;
                    }
                    dashboard.innerHTML = htmlIcerik;
                })
                .catch(err => console.error("Hata:", err));
        }

        // Resmi zorunlu olarak tazeleyen bağımsız fonksiyon
        function resmiTazele() {
            if (!mevcutAktifIP) return;
            const imgElementi = document.getElementById('liveStreamImg');
            // Sonuna milisaniye ekleyerek tarayıcının önbelleği (cache) ezilir
            imgElementi.src = '/api/canli_yayin/' + mevcutAktifIP + '?t=' + new Date().getTime();
        }

        function openLive(ip) {
            mevcutAktifIP = ip; // Buton tetiklendiğinde kullanılmak üzere IP'yi kaydet
            resmiTazele(); // İlk kareyi anında çek
            
            document.getElementById('liveModal').classList.add('show');
            
            if (canliYayinZamanlayici) clearInterval(canliYayinZamanlayici);
            
            // Arka planda her 1 saniyede bir otomatik güncellenmeye devam eder
            canliYayinZamanlayici = setInterval(resmiTazele, 1000); 
        }

        function closeLive() {
            if (canliYayinZamanlayici) {
                clearInterval(canliYayinZamanlayici);
                canliYayinZamanlayici = null;
            }
            mevcutAktifIP = "";
            document.getElementById('liveStreamImg').src = "";
            document.getElementById('liveModal').classList.remove('show');
        }

        // HTML içindeki yenileme butonuna tıklama olayını bağlıyoruz
        document.getElementById('manualRefreshBtn').addEventListener('click', resmiTazele);

        verileriCek();
        setInterval(verileriCek, 1000);
    </script>
</body>
</html>
