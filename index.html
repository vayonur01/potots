<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Dashboard</title>
    <style>
        :root {
            --bg-color: #0c0c0e; --card-bg: #16161a; --text-primary: #f1f1f1;
            --text-secondary: #94a3b8; --accent-green: #10b981; --accent-red: #ef4444;
            --border-color: #24242b; --shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-primary); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
        header { width: 100%; max-width: 1200px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 22px; font-weight: 300; }
        header h1 span { font-weight: 800; }
        .active-badge { background-color: rgba(16, 185, 129, 0.1); color: var(--accent-green); padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; border: 1px solid rgba(16, 185, 129, 0.2); }
        .dashboard-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; }
        .device-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 25px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 15px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .device-name { font-size: 18px; font-weight: 700; color: #fff; }
        .pulse-dot { width: 10px; height: 10px; border-radius: 50%; background-color: var(--accent-green); }
        .card-body { display: flex; flex-direction: column; gap: 8px; }
        .info-row { display: flex; justify-content: space-between; font-size: 14px; }
        .info-label { color: var(--text-secondary); }
        .info-value { color: #fff; font-family: monospace; }
        .live-btn { background-color: var(--accent-red); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; margin-top: 10px; }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px; color: var(--text-secondary); border: 2px dashed var(--border-color); border-radius: 14px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); align-items: center; justify-content: center; flex-direction: column; gap: 15px; }
        .modal.show { display: flex; }
        .modal-content { max-width: 90%; max-height: 80%; border-radius: 10px; border: 4px solid #24242b; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }
        .live-indicator { color: var(--accent-red); font-weight: 800; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header>
        <h1>SİSTEM <span>PANELİ</span></h1>
        <div id="total-count" class="active-badge">Aktif Cihaz: 0</div>
    </header>

    <div id="dashboard" class="dashboard-container">
        <div class="empty-state">Cihaz bekleniyor...</div>
    </div>

    <div id="liveModal" class="modal">
        <span class="close-modal" onclick="closeLive()">&times;</span>
        <div class="live-indicator">🔴 CANLI ANLIK AKIŞ</div>
        <img class="modal-content" id="liveStreamImg" src="">
    </div>

    <script>
        let eskiVeriString = "";

        function verileriCek() {
            fetch('/api/durum?t=' + new Date().getTime())
                .then(res => res.json())
                .then(devices => {
                    const yeniVeriString = JSON.stringify(devices);
                    const dashboard = document.getElementById('dashboard');
                    const totalCount = document.getElementById('total-count');
                    const ipListesi = Object.keys(devices);
                    
                    totalCount.innerText = `Aktif Cihaz: ${ipListesi.length}`;

                    if (yeniVeriString === eskiVeriString) return;
                    eskiVeriString = yeniVeriString;

                    if (ipListesi.length === 0) {
                        dashboard.innerHTML = '<div class="empty-state">Cihaz bekleniyor...</div>';
                        closeLive();
                        return;
                    }

                    let htmlIcerik = '';
                    for (const ip of ipListesi) {
                        htmlIcerik += `
                            <div class="device-card">
                                <div class="card-header">
                                    <div class="device-name">${devices[ip].bilgisayar_adi}</div>
                                    <div class="pulse-dot"></div>
                                </div>
                                <div class="card-body">
                                    <div class="info-row"><span class="info-label">IP Adresi:</span><span class="info-value">${ip}</span></div>
                                    <button class="live-btn" onclick="openLive('${ip}')">📺 CANLI İZLE</button>
                                </div>
                            </div>
                        `;
                    }
                    dashboard.innerHTML = htmlIcerik;
                }).catch(err => console.error(err));
        }

        function openLive(ip) {
            document.getElementById('liveStreamImg').src = '/api/canli_yayin/' + ip;
            document.getElementById('liveModal').classList.add('show');
        }

        function closeLive() {
            document.getElementById('liveStreamImg').src = "";
            document.getElementById('liveModal').classList.remove('show');
        }

        setInterval(verileriCek, 2000);
        verileriCek();
    </script>
</body>
</html>
